name: CI/CD Cost Guardrails

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cost-guardrails:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci_cd_cost_guardrails

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Run cost guardrail evaluation
        run: python main.py

      - name: Fail if cost guardrail fails
        run: |
          if grep -q '"status": "FAIL"' outputs/guardrail_result.json; then
            echo "Cost guardrail failed"
            exit 1
           
           else
            echo "Cost guardrail passed"
          fi
      - name: Upload guardrail result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardrail-result
          path: ci_cd_cost_guardrails/outputs/guardrail_result.json
